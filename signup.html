<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signup.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

    <div class="auth-wrapper">

        <!-- <h1 class="site-title">Constarration</h1> -->

        <div class="signup-card">
            <h2>Create Account</h2>

            <p class="social-title">Sign up with</p>

            <div class="social-buttons">
                <button class="social-btn google">Google</button>
                <button class="social-btn microsoft">Microsoft</button>
                <button class="social-btn yahoo">Yahoo</button>
            </div>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" placeholder="Enter username">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password">
            </div>

            <button class="signup-btn">Create Account</button>

            <div class="links">
                <a href="#">Already have an account?</a>
            </div>
        </div>
    </div>
